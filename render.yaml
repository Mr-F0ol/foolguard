databases:
  - name: foolguard-db
    databaseName: foolguard
    user: foolguard
    plan: free

services:
  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: foolguard-redis
    plan: free
    ipAllowList: []

  # ── API (FastAPI) ─────────────────────────────────────────────────────────────
  - type: web
    name: foolguard-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: foolguard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: foolguard-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /health

  # ── Frontend (React/Vite — static site) ──────────────────────────────────────
  - type: web
    name: foolguard-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: foolguard-api
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
